<div class="p-4 bg-gray-100 text-gray-800 font-mono h-screen overflow-y-auto relative">

    <div class="flex justify-between items-center mb-4 border-b border-gray-300 pb-2">

        <h2 class="text-xl font-bold text-gray-900">
            Live Application Trace
        </h2>

        <button type="button" (click)="clear()"
            class="bg-red-500 hover:bg-red-600 text-white font-bold py-1 px-4 rounded shadow">
            Clear
        </button>

    </div>

    @for (event of (events$ | async); track $index; let last = $last) {

    <div class="flex flex-col">

        <div class="mb-2 p-2 border border-gray-300 rounded bg-white shadow-sm hover:bg-gray-50 transition">

            <span class="text-gray-500 text-xs">
                {{ event.timestamp | date:'hh:mm:ss' }}
            </span>

            <span class="ml-2 font-bold text-blue-600">
                [{{ event.source }}]
            </span>

            <span class="ml-2 text-gray-800">
                {{ event.action }}
            </span>

            <pre class="text-gray-600 text-xs mt-1 bg-gray-100 p-1 rounded overflow-x-auto">
{{ event.metadata | json }}
                </pre>

        </div>

        @if (!last) {

        <div class="flex justify-center text-gray-400 mb-2">

            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">

                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />

            </svg>

        </div>

        }

    </div>

    }

</div>
