<app-page-layout [title]="'Edit Profile'">

      <form
        class="employee-form"
        [class.is-readonly]="!isEditing"
        [formGroup]="editForm"
        (ngSubmit)="onUpdate()"
      >

        <div class="profile-actions">
          <div class="section-tabs" aria-label="Profile sections">
            <button
              type="button"
              class="section-tab"
              [class.active]="activeSection === 'employee'"
              (click)="selectSection('employee')"
            >
              Section 01
            </button>

            <button
              type="button"
              class="section-tab"
              [class.active]="activeSection === 'employeeDetails'"
              (click)="selectSection('employeeDetails')"
            >
              Section 02
            </button>

            <button
              type="button"
              class="section-tab"
              [class.active]="activeSection === 'jobDetails'"
              (click)="selectSection('jobDetails')"
            >
              Section 03
            </button>
          </div>

          <div class="edit-actions">
            <button
              type="button"
              class="action-btn secondary"
              (click)="enableEditing()"
              [disabled]="isEditing"
            >
              Edit
            </button>

            <button
              type="submit"
              class="action-btn primary"
              [disabled]="!canApply"
            >
              {{ isApplying ? 'Applying...' : 'Apply' }}
            </button>
          </div>
        </div>

        <section
          class="section-card"
          formGroupName="employee"
          *ngIf="activeSection === 'employee'"
        >
          <div class="section-heading">
            <h3>Employee Details</h3>
          </div>

          <div class="field-grid">

            <div class="field field--4">
              <label for="first-name">First Name</label>
              <input id="first-name" formControlName="first_name" />
            </div>

            <div class="field field--4">
              <label for="last-name">Last Name</label>
              <input id="last-name" formControlName="last_name" />
            </div>

            <div class="field field--4">
              <label for="phone">Phone No.</label>
              <input id="phone" type="tel" formControlName="phone" />
              <app-error-control [control]="employeeGroup.get('phone')" label="Phone No."></app-error-control>
            </div>

            <div class="field field--4">
              <label for="dob">Date of Birth</label>
              <input id="dob" type="date" formControlName="date_of_birth" />
            </div>

            <div class="field field--4">
              <label for="gender">Gender</label>
              <select id="gender" formControlName="gender">
                <option value="">Select Gender</option>
                <option value="MALE">MALE</option>
                <option value="FEMALE">FEMALE</option>
                <option value="OTHER">OTHER</option>
              </select>
            </div>

          </div>
        </section>

        <section
          class="section-card"
          formGroupName="employeeDetails"
          *ngIf="activeSection === 'employeeDetails'"
        >
          <div class="section-heading">
            <h3>Personal Details</h3>
          </div>

          <div class="field-grid">

            <div class="field field--12">
              <label for="address">Address</label>
              <textarea id="address" formControlName="address"></textarea>
            </div>

            <div class="field field--4">
              <label for="city">City</label>
              <input id="city" formControlName="city" />
            </div>

            <div class="field field--4">
              <label for="state">State</label>
              <input id="state" formControlName="state" />
            </div>

            <div class="field field--4">
              <label for="country">Country</label>
              <input id="country" formControlName="country" />
            </div>

            <div class="field field--4">
              <label for="pincode">Pincode</label>
              <input id="pincode" formControlName="pincode" />
            </div>

            <div class="field field--4">
              <label for="emergency">Emergency Contact</label>
              <input id="emergency" formControlName="emergency_contact" />
              <app-error-control [control]="detailsGroup.get('emergency_contact')" label="Emergency Contact"></app-error-control>
            </div>

            <div class="field field--4">
              <label for="marital">Marital Status</label>
              <select id="marital" formControlName="marital_status">
                <option value="">Select Status</option>
                <option value="SINGLE">SINGLE</option>
                <option value="MARRIED">MARRIED</option>
              </select>
            </div>

            <div class="field field--4">
              <label for="aadhar">Aadhar Number</label>
              <input id="aadhar" formControlName="aadhar_no" />
              <app-error-control [control]="detailsGroup.get('aadhar_no')" label="Aadhar No."></app-error-control>
            </div>

            <div class="field field--4">
              <label for="father">Father Name</label>
              <input id="father" formControlName="father_name" />
            </div>

            <div class="field field--4">
              <label for="mother">Mother Name</label>
              <input id="mother" formControlName="mother_name" />
            </div>

          </div>
        </section>

        <section
          class="section-card"
          formGroupName="jobDetails"
          *ngIf="activeSection === 'jobDetails'"
        >
          <div class="section-heading">
            <h3>Job Details</h3>
          </div>

          <div class="field-grid">

            <div class="field field--4">
              <label for="designation">Designation</label>
              <input id="designation" formControlName="designation" />
            </div>

            <div class="field field--4">
              <label for="department">Department</label>
              <select id="department" formControlName="department">
                <option value="">Select Department</option>
                <option value="BUSINESS">BUSINESS</option>
                <option value="IT">IT</option>
                <option value="WEBDEV">WEBDEV</option>
                <option value="AI">AI</option>
                <option value="MOBILEDEV">MOBILEDEV</option>
                <option value="IOSDEV">IOSDEV</option>
              </select>
            </div>

            <div class="field field--4">
              <label for="type">Employee Type</label>
              <select id="type" formControlName="employee_type">
                <option value="">Select Type</option>
                <option value="FULLTIME">FULLTIME</option>
                <option value="CONTRACT">CONTRACT</option>
                <option value="INTERN">INTERN</option>
              </select>
            </div>

            <div class="field field--4">
              <label for="salary">Salary</label>
              <input id="salary" type="number" formControlName="salary" />
              <app-error-control [control]="jobGroup.get('salary')" label="salary"></app-error-control>
            </div>

            <div class="field field--4">
              <label for="joining">Joining Date</label>
              <input id="joining" type="date" formControlName="joining_date" />
            </div>

            <div class="field field--4">
              <label for="exp">Experience Duration</label>
              <input id="exp" type="number" formControlName="experience_duration" />
            </div>

            <div class="field field--12">
              <label for="skills">Skills</label>
              <textarea id="skills" formControlName="skills"></textarea>
            </div>

            <div class="field field--12">
              <label for="prev">Previous Org</label>
              <textarea id="prev" formControlName="prev_org"></textarea>
            </div>

          </div>
        </section>

      </form>
</app-page-layout>
